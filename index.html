<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offensive Bloom - Ice Mountain 3D</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 1s ease, visibility 1s ease;
    }
    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loader-content { text-align: center; }
    .ascii {
      font-family: 'Courier New', monospace;
      font-size: 32px;
      font-weight: bold;
      color: #00d4ff;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
      animation: asciiAnim 2s infinite linear;
      margin-bottom: 20px;
    }
    @keyframes asciiAnim {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }
    .loading-text {
      font-size: 16px;
      color: #8892b0;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    #loading-status {
      font-size: 12px;
      color: #00d4ff;
      opacity: 0.7;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    
    /* Welcome Animation */
    #welcome-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 10001;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 1;
      transition: opacity 1.5s ease;
    }
    
    #welcome-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .welcome-container {
      text-align: center;
    }
    
    .welcome-text {
      font-family: 'Courier New', monospace;
      font-size: 48px;
      font-weight: bold;
      color: #00eaff;
      text-align: center;
      letter-spacing: 8px;
      overflow: hidden;
      white-space: nowrap;
      border-right: 3px solid #00eaff;
      animation: typing 3.5s steps(30, end), blink-caret 0.75s step-end infinite;
      text-shadow: 0 0 30px rgba(0, 234, 255, 1);
    }
    
    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }
    
    @keyframes blink-caret {
      from, to { border-color: transparent }
      50% { border-color: #00eaff; }
    }
    
    .welcome-subtitle {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: rgba(0, 234, 255, 0.6);
      letter-spacing: 4px;
      margin-top: 30px;
      opacity: 0;
      animation: fadeInOut 4s ease-in-out infinite;
      animation-delay: 1s;
    }
    
    @keyframes fadeInOut {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    
    /* Back Button */
    .back-btn {
      position: fixed;
      bottom: 60px;
      right: 20px;
      padding: 12px 24px;
      font-size: 12px;
      color: #00eaff;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 234, 255, 0.5);
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0, 234, 255, 0.5), inset 0 0 20px rgba(0, 234, 255, 0.15);
      transition: all 0.4s ease;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: none;
      z-index: 200;
    }
    
    .back-btn.show {
      display: block;
      animation: slideIn 0.5s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    .back-btn:hover {
      background: rgba(0, 234, 255, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 0 40px rgba(0, 234, 255, 0.8), inset 0 0 25px rgba(0, 234, 255, 0.2);
    }
    
    /* Slogan */
    .slogan {
      position: fixed;
      bottom: 20px;
      left: 20px;
      text-align: left;
      color: rgba(0, 234, 255, 0.7);
      font-size: 11px;
      letter-spacing: 2px;
      font-weight: 300;
      z-index: 100;
      text-shadow: 0 0 10px rgba(0, 234, 255, 0.5);
      opacity: 0.8;
      pointer-events: none;
    }
    
    .slogan-line {
      margin: 3px 0;
      font-style: italic;
    }
    
    .keyboard-hint {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 16px;
      border-radius: 8px;
      color: #8892b0;
      font-size: 11px;
      z-index: 1000;
      backdrop-filter: blur(8px);
    }
    
    kbd {
      background: rgba(0, 212, 255, 0.2);
      padding: 3px 8px;
      border-radius: 3px;
      border: 1px solid rgba(0, 212, 255, 0.3);
      color: #00d4ff;
      font-family: monospace;
      margin: 0 3px;
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader-content">
      <div class="ascii">---===+++===---</div>
      <div class="loading-text">Loading...</div>
      <div id="loading-status">Initializing...</div>
    </div>
  </div>
  
  <!-- Welcome Animation -->
  <div id="welcome-overlay">
    <div class="welcome-container">
      <div class="welcome-text">WELCOME TO OFFENSIVE BLOOM</div>
      <div class="welcome-subtitle">SECURE ELEMENTS INITIALIZING...</div>
    </div>
  </div>
  
  <div id="canvas-container"></div>
  
  <!-- Back Button (2D UI) -->
  <button class="back-btn" id="backBtn" onclick="resetCamera()">← Back to Start</button>
  
  <!-- Slogan -->
  <div class="slogan">
    <div class="slogan-line">"We find and build what others can't.</div>
    <div class="slogan-line">We break what others trust."</div>
  </div>
  
  <div class="keyboard-hint">Press <kbd>R</kbd> to reset camera</div>
  
  <script type="module" src="script.js"></script>
</body>
</html>
