<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offensive Bloom - Ice Mountain 3D</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    /* LOADER */
    #loader {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 100%);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .ascii { font-family: 'Courier New'; font-size: 32px; color: #00d4ff; animation: pulse 2s infinite; margin-bottom: 20px; }
    .loading-text { color: #8892b0; letter-spacing: 3px; font-size: 14px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* WELCOME */
    #welcome-overlay {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.98);
      z-index: 10001;
      display: flex; justify-content: center; align-items: center;
      transition: opacity 1s ease;
      pointer-events: none;
    }
    #welcome-overlay.hidden { opacity: 0; }
    .welcome-text {
      font-family: 'Courier New'; font-size: 36px; color: #00eaff;
      border-right: 3px solid #00eaff; white-space: nowrap;
      animation: typing 3.5s steps(30) forwards, blink-caret 0.75s step-end infinite;
    }
    @keyframes typing { from { width: 0; } to { width: 100%; } }
    @keyframes blink-caret { from, to { border-color: transparent; } 50% { border-color: #00eaff; } }

    /* CANVAS */
    #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

    /* UI LAYER - FIXED CENTERED */
    .ui-layer {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* BUTTONS CONTAINER - Always Centered */
    .path-buttons {
      position: relative;
      width: 600px; height: 400px;
      display: flex; justify-content: center; align-items: center;
    }

    .path-node { position: absolute; pointer-events: auto; }
    
    /* Closer to center */
    .btn-path1 { top: 15%; left: 10%; }
    .btn-path2 { bottom: 15%; left: 10%; }
    .btn-path3 { top: 15%; right: 10%; }
    .btn-path4 { bottom: 15%; right: 10%; }

    /* GLASS BUTTONS */
    .glass-btn {
      padding: 12px 28px; font-size: 11px; color: #00eaff;
      cursor: pointer; background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px); border: 1px solid rgba(0, 234, 255, 0.4);
      border-radius: 12px; transition: all 0.3s ease;
      font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
    }
    .glass-btn:hover { background: rgba(0, 234, 255, 0.2); box-shadow: 0 0 20px rgba(0, 234, 255, 0.5); }
    .glass-btn.active { background: rgba(0, 234, 255, 0.3); color: #fff; }

    /* BACK BUTTON */
    .back-btn {
      position: fixed; bottom: 40px; right: 40px;
      padding: 14px 28px; font-size: 12px; color: #fff;
      background: rgba(0, 234, 255, 0.1); border: 1px solid rgba(0, 234, 255, 0.5);
      border-radius: 12px; cursor: pointer; pointer-events: auto;
      opacity: 0; transform: translateY(20px); transition: all 0.5s ease;
      z-index: 150;
    }
    .back-btn.show { opacity: 1; transform: translateY(0); }
    .back-btn:hover { background: rgba(0, 234, 255, 0.3); }

    .slogan {
      position: fixed; bottom: 40px; left: 40px;
      color: rgba(0, 234, 255, 0.6); font-size: 11px; letter-spacing: 1px;
      pointer-events: none; z-index: 100;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="ascii">---===+++===---</div>
    <div class="loading-text">INITIALIZING SYSTEM</div>
  </div>

  <div id="welcome-overlay">
    <div class="welcome-text">WELCOME TO OFFENSIVE BLOOM</div>
  </div>

  <div id="canvas-container"></div>

  <div class="ui-layer">
    <div class="path-buttons">
      <div class="path-node btn-path1">
        <button class="glass-btn" onclick="playPath(1)">PATH 01</button>
      </div>
      <div class="path-node btn-path2">
        <button class="glass-btn" onclick="playPath(2)">PATH 02</button>
      </div>
      <div class="path-node btn-path3">
        <button class="glass-btn" onclick="playPath(3)">PATH 03</button>
      </div>
      <div class="path-node btn-path4">
        <button class="glass-btn" onclick="playPath(4)">PATH 04</button>
      </div>
    </div>
    
    <button class="back-btn" id="backBtn" onclick="resetCamera()">← BACK TO START</button>
    
    <div class="slogan">
      "We find and build what others can't.<br>We break what others trust."
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
