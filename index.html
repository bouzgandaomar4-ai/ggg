<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offensive Bloom</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; font-family: 'Inter', sans-serif; }
    
    /* LOADER */
    #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 1s ease; }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .ascii { font-family: 'Courier New'; font-size: 32px; color: #00d4ff; margin-bottom: 20px; }
    .loading-text { color: #8892b0; letter-spacing: 3px; font-size: 14px; }

    /* WELCOME */
    #welcome-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 10001; display: flex; justify-content: center; align-items: center; opacity: 1; transition: opacity 1.5s ease; }
    #welcome-overlay.hidden { opacity: 0; pointer-events: none; }
    .welcome-text { font-family: 'Courier New'; font-size: 48px; color: #00eaff; border-right: 3px solid #00eaff; white-space: nowrap; animation: typing 3.5s steps(30, end), blink-caret 0.75s step-end infinite; text-shadow: 0 0 30px rgba(0, 234, 255, 1); }
    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #00eaff; } }
    
    /* BUTTONS */
    .path-buttons { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; pointer-events: none; width: 400px; height: 250px; transition: opacity 0.5s ease; }
    .path-buttons.hidden { opacity: 0; }
    .path-node { position: absolute; pointer-events: auto; }
    
    .btn-path1 { top: 15%; left: -120px; }
    .btn-path2 { top: 65%; left: -100px; }
    .btn-path3 { top: 15%; right: -100px; }
    .btn-path4 { top: 65%; right: -120px; }
    
    .path-node svg { position: absolute; width: 150px; height: 120px; pointer-events: none; opacity: 0.7; }
    .line { stroke: #00eaff; stroke-width: 1.5; stroke-dasharray: 5, 5; animation: dash 20s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: 100; } }
    .dot { fill: #00eaff; filter: drop-shadow(0 0 8px rgba(0, 234, 255, 1)); }
    
    .glass-btn { padding: 10px 20px; font-size: 11px; color: #00eaff; cursor: pointer; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(0, 234, 255, 0.4); border-radius: 12px; box-shadow: 0 0 20px rgba(0, 234, 255, 0.2); transition: all 0.3s; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
    .glass-btn:hover { background: rgba(0, 234, 255, 0.15); transform: translateY(-3px); box-shadow: 0 0 30px rgba(0, 234, 255, 0.6); }
    .glass-btn.active { background: rgba(0, 234, 255, 0.3); color: #fff; }
    
    .back-btn { position: fixed; bottom: 60px; right: 20px; padding: 12px 24px; font-size: 12px; color: #00eaff; cursor: pointer; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); border: 1px solid rgba(0, 234, 255, 0.5); border-radius: 12px; display: none; z-index: 200; }
    .back-btn.show { display: block; animation: slideIn 0.5s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    
    .slogan { position: fixed; bottom: 20px; left: 20px; color: rgba(0, 234, 255, 0.7); font-size: 11px; letter-spacing: 2px; pointer-events: none; }
    .keyboard-hint { position: fixed; bottom: 20px; right: 20px; background: rgba(0, 0, 0, 0.6); padding: 10px; border-radius: 8px; color: #8892b0; font-size: 11px; }
  </style>
</head>
<body>
  <div id="loader"> <div class="ascii">---===+++===---</div> <div class="loading-text">Loading...</div> </div>
  <div id="welcome-overlay"> <div class="welcome-text">WELCOME TO OFFENSIVE BLOOM</div> </div>
  <div id="canvas-container"></div>
  
  <div class="path-buttons" id="button-group">
    <div class="path-node btn-path1"> <svg><line x1="130" y1="70" x2="50" y2="40" class="line"/><circle cx="50" cy="40" r="4" class="dot"/></svg> <button class="glass-btn" onmouseenter="onHoverStart()" onmouseleave="onHoverEnd()" onclick="playPath(1)">Path 1</button> </div>
    <div class="path-node btn-path2"> <svg><line x1="120" y1="10" x2="40" y2="50" class="line"/><circle cx="40" cy="50" r="4" class="dot"/></svg> <button class="glass-btn" onmouseenter="onHoverStart()" onmouseleave="onHoverEnd()" onclick="playPath(2)">Path 2</button> </div>
    <div class="path-node btn-path3"> <svg><line x1="20" y1="70" x2="100" y2="40" class="line"/><circle cx="100" cy="40" r="4" class="dot"/></svg> <button class="glass-btn" onmouseenter="onHoverStart()" onmouseleave="onHoverEnd()" onclick="playPath(3)">Path 3</button> </div>
    <div class="path-node btn-path4"> <svg><line x1="30" y1="10" x2="110" y2="50" class="line"/><circle cx="110" cy="50" r="4" class="dot"/></svg> <button class="glass-btn" onmouseenter="onHoverStart()" onmouseleave="onHoverEnd()" onclick="playPath(4)">Path 4</button> </div>
  </div>
  
  <button class="back-btn" id="backBtn" onclick="resetCamera()">← Back to Start</button>
  <div class="slogan"> <div>"We find and build what others can't.</div> <div>We break what others trust."</div> </div>
  <div class="keyboard-hint">Press <kbd>R</kbd> to reset</div>
  
  <script type="module" src="script.js"></script>
</body>
</html>
